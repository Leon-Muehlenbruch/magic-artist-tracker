<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Artist Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0e14;
      --surface: #13161f;
      --surface2: #1a1e2b;
      --border: #2a2f45;
      --accent: #c89b3c;
      --accent2: #7c5cbc;
      --text: #e8e6f0;
      --muted: #8a8fa8;
      --danger: #e05c5c;
      --success: #4caf82;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(180deg, #0a0c12 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #e8c87a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.04em;
    }

    .logo span {
      background: linear-gradient(135deg, var(--accent2), #a880f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    nav button:hover, nav button.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── EVENTS LIST ── */
    .page-title {
      font-family: 'Cinzel', serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
    }

    .events-container {
      display: flex;
      flex-direction: column;
      gap: 3.5rem;
    }

    /* ── EVENT CARD ── */
    .event-block {}

    .event-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .event-meta {}

    .event-name {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .event-details {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .event-detail {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .event-detail svg {
      width: 14px;
      height: 14px;
      opacity: 0.7;
    }

    .event-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      background: rgba(200, 155, 60, 0.15);
      color: var(--accent);
      border: 1px solid rgba(200, 155, 60, 0.3);
      white-space: nowrap;
      align-self: flex-start;
    }

    /* ── ARTIST SECTION ── */
    .artists-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .artists-grid {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .artist-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .artist-nameplate {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .artist-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .scryfall-link {
      font-size: 0.75rem;
      color: var(--accent2);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .scryfall-link:hover { opacity: 1; }

    .cards-row {
      display: flex;
      gap: 0.75rem;
      padding: 1rem 1.2rem;
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      min-height: 120px;
      align-items: center;
    }

    .cards-row::-webkit-scrollbar { height: 4px; }
    .cards-row::-webkit-scrollbar-track { background: transparent; }
    .cards-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .card-img {
      height: 120px;
      width: auto;
      border-radius: 6px;
      transition: transform 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
      cursor: pointer;
    }

    .card-img:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }

    .loading-cards {
      color: var(--muted);
      font-size: 0.8rem;
      padding: 0.5rem;
    }

    .no-cards {
      color: var(--muted);
      font-size: 0.8rem;
      font-style: italic;
    }

    /* ── ADMIN VIEW ── */
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 700px) {
      .admin-grid { grid-template-columns: 1fr; }
    }

    .admin-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .admin-panel h2 {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
      margin-top: 1rem;
    }

    label:first-of-type { margin-top: 0; }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }

    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #0c0e14;
      margin-top: 1.25rem;
    }

    .btn-primary:hover { background: #d4aa50; }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 0.3rem 0.7rem;
      font-size: 0.75rem;
    }

    .btn-danger:hover { background: rgba(224, 92, 92, 0.1); }

    .btn-sm {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.3rem 0.7rem;
      font-size: 0.75rem;
    }

    .btn-sm:hover { border-color: var(--accent2); color: var(--accent2); }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--success);
      color: var(--success);
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-size: 0.875rem;
      z-index: 999;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── EVENT LIST (admin right panel) ── */
    .event-list-admin {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 500px;
      overflow-y: auto;
    }

    .event-list-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }

    .event-list-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }

    .event-list-item-name {
      font-size: 0.875rem;
      font-weight: 600;
    }

    .event-list-item-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .artist-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .artist-tag {
      background: rgba(124, 92, 188, 0.15);
      border: 1px solid rgba(124, 92, 188, 0.3);
      color: #a880f0;
      padding: 0.15rem 0.6rem;
      border-radius: 100px;
      font-size: 0.72rem;
    }

    .add-artist-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .add-artist-row input {
      flex: 1;
      font-size: 0.78rem;
      padding: 0.4rem 0.7rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .export-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .export-section p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .code-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      max-height: 200px;
      overflow-y: auto;
      white-space: pre;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      .logo { font-size: 1rem; }
      main { padding: 1.5rem 1rem; }
      .event-name { font-size: 1.15rem; }
    }

    /* card modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-img {
      max-height: 80vh;
      max-width: 90vw;
      border-radius: 12px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Magic <span>Artist</span> Tracker</div>
  <nav>
    <button class="active" onclick="switchView('events', this)">Events</button>
    <button onclick="switchView('admin', this)">✦ Admin</button>
  </nav>
</header>

<main>

  <!-- ── EVENTS VIEW ── -->
  <div id="view-events" class="view active">
    <div class="page-title">EU Magic Events</div>
    <div class="page-subtitle">Artists attending Magic: The Gathering events across Europe</div>
    <div id="events-container" class="events-container"></div>
  </div>

  <!-- ── ADMIN VIEW ── -->
  <div id="view-admin" class="view">
    <div class="page-title">Admin</div>
    <div class="page-subtitle">Add events and manage artists</div>
    <div class="admin-grid">

      <!-- Add Event Form -->
      <div class="admin-panel">
        <h2>Add / Edit Event</h2>

        <label>Event Name</label>
        <input id="a-name" type="text" placeholder="e.g. Eternal Weekend Europe 2025" />

        <label>Location</label>
        <input id="a-location" type="text" placeholder="e.g. Paris, France" />

        <label>Date</label>
        <input id="a-date" type="date" />

        <label>Artist Page URL (optional)</label>
        <input id="a-url" type="url" placeholder="https://..." />

        <label>Artists (one per line)</label>
        <textarea id="a-artists" placeholder="Volkan Baǵa&#10;Seb McKinnon&#10;Johannes Voss"></textarea>

        <button class="btn btn-primary" onclick="addEvent()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Add Event
        </button>
      </div>

      <!-- Event List -->
      <div class="admin-panel">
        <h2>Saved Events</h2>
        <div id="admin-event-list" class="event-list-admin"></div>

        <div class="export-section">
          <p>Copy this JSON to your <code>events.json</code> for GitHub Pages:</p>
          <div id="json-export" class="code-block"></div>
          <button class="btn btn-sm" style="margin-top:0.75rem" onclick="copyJSON()">Copy JSON</button>
        </div>
      </div>

    </div>
  </div>

</main>

<!-- Card modal -->
<div class="modal-overlay" id="modal" onclick="closeModal()">
  <img class="modal-img" id="modal-img" src="" alt="Card" />
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let events = [];

// ── INIT ──
async function init() {
  // Try to load from events.json (works on GitHub Pages)
  try {
    const res = await fetch('events.json');
    if (res.ok) {
      events = await res.json();
    }
  } catch(e) {}

  // Also merge from localStorage (admin edits)
  const stored = localStorage.getItem('mat_events');
  if (stored) {
    try {
      const local = JSON.parse(stored);
      if (local.length > 0) events = local;
    } catch(e) {}
  }

  renderEvents();
  renderAdminList();
  renderJSON();

  // Scroll to the next upcoming event on load
  setTimeout(() => {
    const now = new Date();
    const sorted = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));
    const nextEvent = sorted.find(ev => {
      const endDate = ev.dateEnd ? new Date(ev.dateEnd) : new Date(ev.date);
      return endDate >= now;
    });
    if (nextEvent) {
      const el = document.getElementById('event-' + nextEvent.id);
      if (el) el.scrollIntoView({ behavior: 'instant', block: 'start' });
    }
  }, 400);
}

function saveLocal() {
  localStorage.setItem('mat_events', JSON.stringify(events));
}

// ── VIEW SWITCH ──
function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── SCRYFALL ──
function scryfallQuery(artist) {
  return `a:"${artist}"`;
}

function scryfallSearchURL(artist) {
  return `https://scryfall.com/search?q=a%3A%22${encodeURIComponent(artist)}%22&unique=art`;
}

async function loadArtistCards(artist, container) {
  container.innerHTML = '<span class="loading-cards">Loading cards…</span>';
  try {
    const q = encodeURIComponent(`a:"${artist}"`);
    const url = `https://api.scryfall.com/cards/search?q=${q}&unique=art&order=edhrec&game=paper`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('no cards');
    const data = await res.json();
    const cards = (data.data || []).slice(0, 10);
    if (!cards.length) {
      container.innerHTML = '<span class="no-cards">No cards found</span>';
      return;
    }
    container.innerHTML = '';
    cards.forEach(card => {
      const img = card.image_uris?.border_crop || card.image_uris?.normal;
      if (!img) return;
      const el = document.createElement('img');
      el.className = 'card-img';
      el.src = img;
      el.alt = card.name;
      el.title = card.name;
      el.onclick = () => openModal(img);
      container.appendChild(el);
    });
  } catch(e) {
    container.innerHTML = '<span class="no-cards">Could not load cards</span>';
  }
}

// ── RENDER EVENTS ──
function renderEvents() {
  const container = document.getElementById('events-container');
  if (!events.length) {
    container.innerHTML = '<div class="empty-state">No events yet. Add one in the Admin tab.</div>';
    return;
  }

  const sorted = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));
  container.innerHTML = '';

  sorted.forEach(ev => {
    const dateObj = new Date(ev.date);
    let dateStr;
    if (ev.dateEnd) {
      const endObj = new Date(ev.dateEnd);
      const startDay = dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'long' });
      const endDay = endObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
      dateStr = `${startDay} – ${endDay}`;
    } else {
      dateStr = dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }
    const isPast = (ev.dateEnd ? new Date(ev.dateEnd) : dateObj) < new Date();

    const block = document.createElement('div');
    block.className = 'event-block';
    block.id = 'event-' + ev.id;

    block.innerHTML = `
      <div class="event-header">
        <div class="event-meta">
          <div class="event-name">${ev.name}</div>
          <div class="event-details">
            <span class="event-detail">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${ev.location}
            </span>
            <span class="event-detail">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              ${dateStr}
            </span>
          </div>
        </div>
        <span class="event-badge">${isPast ? 'Past Event' : 'Upcoming'}</span>
      </div>

      <div class="artists-label">${ev.artists.length} Artist${ev.artists.length !== 1 ? 's' : ''}</div>
      <div class="artists-grid" id="artists-${ev.id}"></div>
    `;
    container.appendChild(block);

    const artistsGrid = document.getElementById('artists-' + ev.id);

    ev.artists.forEach(artist => {
      const ab = document.createElement('div');
      ab.className = 'artist-block';
      ab.innerHTML = `
        <div class="artist-nameplate">
          <span class="artist-name">${artist}</span>
          <a class="scryfall-link" href="${scryfallSearchURL(artist)}" target="_blank">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Scryfall
          </a>
        </div>
        <div class="cards-row" id="cards-${ev.id}-${slugify(artist)}"></div>
      `;
      artistsGrid.appendChild(ab);

      // lazy-load cards via IntersectionObserver
      const cardsRow = document.getElementById(`cards-${ev.id}-${slugify(artist)}`);
      cardsRow.innerHTML = '<span class="loading-cards">Scroll into view to load…</span>';

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            loadArtistCards(artist, cardsRow);
            observer.unobserve(entry.target);
          }
        });
      }, { rootMargin: '200px' });

      observer.observe(cardsRow);
    });
  });
}

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]/g, '_');
}

// ── ADMIN ──
function addEvent() {
  const name = document.getElementById('a-name').value.trim();
  const location = document.getElementById('a-location').value.trim();
  const date = document.getElementById('a-date').value;
  const url = document.getElementById('a-url').value.trim();
  const artistsRaw = document.getElementById('a-artists').value.trim();

  if (!name || !location || !date) {
    showToast('Please fill in name, location and date.', true);
    return;
  }

  const artists = artistsRaw ? artistsRaw.split('\n').map(a => a.trim()).filter(Boolean) : [];
  const id = slugify(name) + '_' + date;

  const existing = events.findIndex(e => e.id === id);
  const ev = { id, name, location, date, url, artists };

  if (existing >= 0) {
    events[existing] = ev;
    showToast('Event updated!');
  } else {
    events.push(ev);
    showToast('Event added!');
  }

  saveLocal();
  renderEvents();
  renderAdminList();
  renderJSON();

  // Clear form
  ['a-name','a-location','a-date','a-url','a-artists'].forEach(id => document.getElementById(id).value = '');
}

function deleteEvent(id) {
  events = events.filter(e => e.id !== id);
  saveLocal();
  renderEvents();
  renderAdminList();
  renderJSON();
  showToast('Event deleted.');
}

function editEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  document.getElementById('a-name').value = ev.name;
  document.getElementById('a-location').value = ev.location;
  document.getElementById('a-date').value = ev.date;
  document.getElementById('a-url').value = ev.url || '';
  document.getElementById('a-artists').value = ev.artists.join('\n');
  // Delete so re-adding replaces
  deleteEvent(id);
}

function addArtistToEvent(id) {
  const input = document.getElementById('artist-input-' + id);
  const name = input.value.trim();
  if (!name) return;
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  if (!ev.artists.includes(name)) {
    ev.artists.push(name);
    saveLocal();
    renderEvents();
    renderAdminList();
    renderJSON();
  }
  input.value = '';
}

function removeArtist(eventId, artist) {
  const ev = events.find(e => e.id === eventId);
  if (!ev) return;
  ev.artists = ev.artists.filter(a => a !== artist);
  saveLocal();
  renderEvents();
  renderAdminList();
  renderJSON();
}

function renderAdminList() {
  const list = document.getElementById('admin-event-list');
  if (!events.length) {
    list.innerHTML = '<div class="empty-state" style="padding:2rem">No events yet.</div>';
    return;
  }
  const sorted = [...events].sort((a,b) => new Date(a.date)-new Date(b.date));
  list.innerHTML = sorted.map(ev => `
    <div class="event-list-item">
      <div class="event-list-item-header">
        <span class="event-list-item-name">${ev.name}</span>
        <div style="display:flex;gap:0.4rem">
          <button class="btn btn-sm" onclick="editEvent('${ev.id}')">Edit</button>
          <button class="btn btn-danger" onclick="deleteEvent('${ev.id}')">✕</button>
        </div>
      </div>
      <div class="event-list-item-sub">${ev.location} · ${ev.date}</div>
      <div class="artist-tags">
        ${ev.artists.map(a => `
          <span class="artist-tag" title="Click to remove" onclick="removeArtist('${ev.id}','${a.replace(/'/g,"\\'")}')">
            ${a} ×
          </span>`).join('')}
      </div>
      <div class="add-artist-row">
        <input id="artist-input-${ev.id}" type="text" placeholder="Add artist…" onkeydown="if(event.key==='Enter') addArtistToEvent('${ev.id}')" />
        <button class="btn btn-sm" onclick="addArtistToEvent('${ev.id}')">Add</button>
      </div>
    </div>
  `).join('');
}

function renderJSON() {
  document.getElementById('json-export').textContent = JSON.stringify(events, null, 2);
}

function copyJSON() {
  navigator.clipboard.writeText(JSON.stringify(events, null, 2));
  showToast('JSON copied!');
}

// ── MODAL ──
function openModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ── TOAST ──
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isError ? 'var(--danger)' : 'var(--success)';
  t.style.color = isError ? 'var(--danger)' : 'var(--success)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── START ──
init();
</script>
</body>
</html>
